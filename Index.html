<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignUp Form</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>
  <div class="signup-main">
    <h1 class="header">Signup</h1>

    <form method="post" class="form">

      <input type="text" placeholder="Full Name" required/>
      <input type="email" name="email" placeholder="Email" required/>
      <input type="password" name="password" placeholder="Password" required/>
      <input type="password" name="Confirm_password" placeholder="Confirm Password" required/>
      <input type="date" name="date" placeholder="DD-MM-YYYY" required/>
      
      <div class="radio-group">
        
        <label for="student"><input type="radio" name="user" id="student" value="Student" required/>Student</label>
        <input type="radio" name="user" id="employee" value="Employee" required/>
        <label for="employee">Employee</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" name="toc" id="toc"/>
        <label for="toc">I agreed to all Terms and Conditions</label>
      </div>

      <button type="submit">SignUp</button>
    </form>
  </div>
</body>
</html>
